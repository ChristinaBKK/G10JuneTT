<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>June 2026 Timetable</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel">
      <div class="hero-header">
        <div class="hero-copy-block">
          <p class="eyebrow">G10 June 2026</p>
          <h1>Student Timetable Lookup</h1>
          <p class="hero-copy">
            Load the published Supabase timetable, review teacher and room details, and export a cleaner,
            easier-to-read schedule without the oversized cell layout.
          </p>
        </div>

        <div class="hero-topbar">
          <img class="logo-lockup" src="./school_logo.png" alt="Wuxi Dipont School of Arts and Science and King's College International School, Wuxi logo">
        </div>
      </div>

      <form id="lookupForm" class="lookup-form">
        <label class="field-label" for="pupilID">Pupil ID</label>
        <div class="field-row">
          <input type="text" id="pupilID" name="pupilID" placeholder="Enter Pupil ID" autocomplete="off" required>
          <button type="submit" id="lookupButton">Get Timetable</button>
          <button type="button" id="downloadPDF" class="secondary-action" hidden>Download PDF</button>
        </div>
      </form>

      <section class="recent-lookups" aria-labelledby="recentLookupsHeading">
        <div class="recent-lookups__header">
          <h2 id="recentLookupsHeading">Recent Lookups</h2>
          <button type="button" id="clearRecentLookups" class="recent-lookups__clear" hidden>Clear</button>
        </div>
        <div id="recentLookups" class="recent-lookups__list"></div>
      </section>
    </section>

    <section class="table-panel">
      <div id="timetableContainer" class="timetable-container"></div>
    </section>

    <footer class="page-footer">Developed by Dr. Christina Feng</footer>
  </main>

  <noscript>This page requires JavaScript to load timetable data from Supabase.</noscript>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
