<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>June 2026 Timetable</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <main class="app-shell">
    <section class="hero-panel">
      <p class="eyebrow">G10 June 2026</p>
      <h1>Student Timetable Lookup</h1>
      <p class="hero-copy">
        This timetable is now served from Supabase. Enter a pupil ID to load the published schedule,
        teacher and room details, then export the result as a PDF.
      </p>

      <form id="lookupForm" class="lookup-form">
        <label class="field-label" for="pupilID">Pupil ID</label>
        <div class="field-row">
          <input type="text" id="pupilID" name="pupilID" placeholder="Enter Pupil ID" autocomplete="off" required>
          <button type="submit" id="lookupButton">Get Timetable</button>
          <button type="button" id="downloadPDF" class="secondary-action" hidden>Download PDF</button>
        </div>
      </form>

      <section class="recent-lookups" aria-labelledby="recentLookupsHeading">
        <div class="recent-lookups__header">
          <h2 id="recentLookupsHeading">Recent Lookups</h2>
          <button type="button" id="clearRecentLookups" class="recent-lookups__clear" hidden>Clear</button>
        </div>
        <div id="recentLookups" class="recent-lookups__list"></div>
      </section>

      <p id="statusMessage" class="status-message" aria-live="polite">
        Ready. Enter a pupil ID to fetch timetable data.
      </p>
    </section>

    <section class="table-panel">
      <div id="timetableContainer" class="timetable-container"></div>
    </section>
  </main>

  <noscript>This page requires JavaScript to load timetable data from Supabase.</noscript>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
